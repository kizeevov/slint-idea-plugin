<!DOCTYPE html>
<html lang="en" style="height: 100%; width: 100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slint Preview</title>
    <script type="module">
        "use strict";
        import * as slint_preview from './slint_lsp_wasm.js';
        await slint_preview.default();

        // const vscode = acquireVsCodeApi();
        let promises = {};
        try {
            slint_preview.run_event_loop();
        } catch (_) {
            // This is actually not an error:-/
        }

        const canvas_id = "canvas";

        const canvas = document.createElement("canvas");

        const pending_mapping_requests = {};

        canvas.id = canvas_id;
        canvas.className = canvas_id;
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.outline = "none";
        canvas.style.touchAction = "none";
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        canvas.dataset.slintAutoResizeToPreferred = "false";

        document.body.replaceChildren(canvas);

        new ResizeObserver(() => {
            canvas.style.minWidth = "100%";
            canvas.style.width = "100%";
            canvas.style.maxWidth = "100%";
            canvas.style.minHeight = "100%";
            canvas.style.height = "100%";
            canvas.style.maxHeight = "100%";
        }).observe(document.body);

        let preview_connector = await slint_preview.PreviewConnector.create(
            (data) => {
                // vscode.postMessage({ command: "slint/preview_to_lsp", params: data });
                console.log("++++ " + JSON.stringify(data))
            },
            (url) => { return new Promise((resolve, _) => {
                pending_mapping_requests[url] = resolve;
                // vscode.postMessage({ command: "map_url", url: url });
                console.log(url)
            })},
            "native",
            false // ${experimental ? "true" : "false"}
        );

        window.addEventListener('message', async message => {
            if (message.data.command === "slint/lsp_to_preview") {
                preview_connector.process_lsp_to_preview_message(
                    message.data.params,
                );

                return true;
            }
            if (message.data.command === "map_response") {
                const original = message.data.original;

                const resolve = pending_mapping_requests[original];
                delete pending_mapping_requests[original];
                if (resolve) {
                    resolve(message.data.mapped);
                }
            }
        });

        const setContentMessage = {
            SetContents: {
                url: {
                    url: "user://25fab7f2-049f-460d-ab51-2669f367a284.slint.rs/main.slint",
                },
                contents: `
import { AboutSlint, Button, VerticalBox } from "std-widgets.slint";
export component Demo {
    Rectangle {
        background: red;
        height: 100px;
        width: 100px;
    }
}`
            }
        }

        const showPreviewMessage = {
                ShowPreview: {
                    url: "user://25fab7f2-049f-460d-ab51-2669f367a284.slint.rs/main.slint",
                    component: "Demo",
                    style: ""
                }
            }

        const kMessage = {
            KnownComponents: {
            "url": {
            "url": "user://25fab7f2-049f-460d-ab51-2669f367a284.slint.rs/test.slint",
                "version": 4
        },
            "components": [
            {
                "name": "Button",
                "category": "Input",
                "is_global": false,
                "is_builtin": false,
                "is_std_widget": true,
                "is_exported": true,
                "is_layout": false,
                "fills_parent": false,
                "defined_at": null,
                "default_properties": [
                    {
                        "name": "text",
                        "value": "\"Button\""
                    }
                ]
            }
        ]
        }
        }

        preview_connector.show_ui().then(() => {
            canvas.style.width = "100%";
            canvas.style.height = "100%";
            // vscode.postMessage({ command: 'preview_ready' });

            preview_connector.process_lsp_to_preview_message(
                setContentMessage,
            );
            preview_connector.process_lsp_to_preview_message(
                showPreviewMessage,
            );
            preview_connector.process_lsp_to_preview_message(
                kMessage
            );
        });

        // const message = {
        //     ShowPreview: {
        //         url: "file:///Users/kizeev/projects/car-dashboard/dashboard/ui/test.slint",
        //         component: "",
        //         style: "native"
        //     }
        // }
    </script>
</head>
<body style="padding: 0; height: 100%; width: 100%" data-vscode-context='{"webviewSection": "slint-previewer"}'>>
</body>
</html>
